name: full_yandex_three_methods
description: "Полное сравнение трёх HGS-методов на yandex-датасете (26 инстансов)."

instances:
  - {name: "0",  kind: yandex}
  - {name: "1",  kind: yandex}
  - {name: "2",  kind: yandex}
  - {name: "3",  kind: yandex}
  - {name: "4",  kind: yandex}
  - {name: "5",  kind: yandex}
  - {name: "6",  kind: yandex}
  - {name: "7",  kind: yandex}
  - {name: "8",  kind: yandex}
  - {name: "9",  kind: yandex}
  - {name: "10", kind: yandex}
  - {name: "11", kind: yandex}
  - {name: "12", kind: yandex}
  - {name: "13", kind: yandex}
  - {name: "14", kind: yandex}
  - {name: "15", kind: yandex}
  - {name: "16", kind: yandex}
  - {name: "17", kind: yandex}
  - {name: "18", kind: yandex}
  - {name: "19", kind: yandex}
  - {name: "20", kind: yandex}
  - {name: "21", kind: yandex}
  - {name: "22", kind: yandex}
  - {name: "23", kind: yandex}
  - {name: "24", kind: yandex}
  - {name: "25", kind: yandex}

algorithms:
  - name: hgs_simple
    type: hgs_simple
    algorithm_params: {}

  - name: hgs_rebalance
    type: hgs_rebalance
    algorithm_params:
      enable_fairness: true
      max_cost_increase_pct: 5.0
      rebalance_iterations: 3000

  - name: hgs_penalty
    type: hgs_penalty
    algorithm_params:
      fairness_weight: 0.3
      num_restarts: 5
      max_cost_increase_pct: 5.0

  - name: hgs_adaptive_linear
    type: hgs_adaptive
    algorithm_params:
      initial_route_balance: 500.0
      strategy: linear
      decay: 0.99999
      trace: true

shared:
  time_limit: 30
  seed: 42
  capacity: 200
  num_vehicles: 25
